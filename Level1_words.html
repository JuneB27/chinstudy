    // 배열 섞기 함수
    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function switchMode(mode) {
        document.getElementById('tab1').classList.remove('active');
        document.getElementById('tab2').classList.remove('active');
        document.getElementById('mode1').classList.remove('active');
        document.getElementById('mode2').classList.remove('active');

        document.getElementById('tab' + mode).classList.add('active');
        document.getElementById('mode' + mode).classList.add('active');
        
        if(mode === 2 && mcqDeck.length === 0) {
            initMcq();
        }
    }

    let chineseVoice = null;

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        chineseVoice = voices.find(voice => 
            voice.lang.includes('zh') && 
            (voice.name.includes('Google') || voice.name.includes('Microsoft') || voice.name.includes('Yaoxiao') || voice.name.includes('Huihui') || voice.name.includes('Ting-Ting'))
        );
        if (!chineseVoice) {
            chineseVoice = voices.find(voice => voice.lang.includes('zh'));
        }
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices(); 
    }

    function playAudio(event) {
        event.stopPropagation();
        
        const textToRead = cardDeck[cardIndex].hanzi;

        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = 'zh-CN';
            if (chineseVoice) utterance.voice = chineseVoice;
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        } else {
            alert("현재 사용 중인 브라우저는 음성 읽기 기능(TTS)을 지원하지 않습니다.");
        }
    }

    /* 플래시 카드 로직 */
    let cardDeck = [...rawData];
    let cardIndex = 0;
    let isPinyinVisible = true; 

    function renderCard() {
        const word = cardDeck[cardIndex];
        
        document.getElementById('cardHanzi').innerText = word.hanzi;
        document.getElementById('cardProgress').innerText = `${cardIndex + 1} / ${cardDeck.length}`;
        
        const pinyinEl = document.getElementById('cardPinyin');
        pinyinEl.innerText = word.pinyin;
        pinyinEl.style.visibility = isPinyinVisible ? 'visible' : 'hidden';
        
        document.getElementById('cardType').innerText = word.type;
        document.getElementById('cardMeaning').innerText = word.meaning;
        document.getElementById('cardExampleZh').innerText = word.exampleZh;
        document.getElementById('cardExampleKo').innerText = word.exampleKo;
        
        document.getElementById('flashcard').classList.remove('flipped');
    }

    function togglePinyin() {
        isPinyinVisible = !isPinyinVisible;
        const pinyinEl = document.getElementById('cardPinyin');
        const btn = document.getElementById('togglePinyinBtn');

        if (isPinyinVisible) {
            pinyinEl.style.visibility = 'visible';
            btn.innerText = '병음 끄기 👁️';
            btn.classList.remove('off');
        } else {
            pinyinEl.style.visibility = 'hidden';
            btn.innerText = '병음 켜기 🙈';
            btn.classList.add('off');
        }
    }

    function toggleCard() {
        document.getElementById('flashcard').classList.toggle('flipped');
    }

    function nextCard() {
        if(window.speechSynthesis) window.speechSynthesis.cancel();

        if (cardIndex < cardDeck.length - 1) {
            cardIndex++;
            renderCard();
        } else {
            alert('마지막 카드입니다. 카드를 섞어 처음부터 다시 시작합니다.');
            shuffleCards();
        }
    }

    function prevCard() {
        if(window.speechSynthesis) window.speechSynthesis.cancel();
        
        if (cardIndex > 0) {
            cardIndex--;
            renderCard();
        }
    }

    function shuffleCards() {
        if(window.speechSynthesis) window.speechSynthesis.cancel();
        cardDeck = shuffleArray(rawData);
        cardIndex = 0;
        renderCard();
    }

    renderCard();

    /* 객관식 퀴즈 로직 */
    let mcqDeck = [];
    let mcqIndex = 0;
    let score = 0;
    let answered = false;

    function initMcq() {
        mcqDeck = shuffleArray(rawData);
        mcqIndex = 0;
        score = 0;
        updateMcqUI();
        loadMcqQuestion();
    }

    function loadMcqQuestion() {
        if (mcqIndex >= mcqDeck.length) {
            document.getElementById('mcqMeaningText').innerHTML = "🎉 모든 퀴즈 완료!";
            document.getElementById('mcqType').style.display = 'none';
            document.getElementById('mcqOptions').innerHTML = "";
            document.getElementById('mcqFeedback').innerHTML = `총 <b>${mcqDeck.length}</b>문제 중 <b>${score}</b>문제를 맞히셨습니다.`;
            document.getElementById('mcqNextBtn').style.display = 'none';
            return;
        }

        answered = false;
        document.getElementById('mcqNextBtn').style.display = 'none';
        document.getElementById('mcqFeedback').innerHTML = "";
        
        const currentQ = mcqDeck[mcqIndex];
        document.getElementById('mcqType').innerText = currentQ.type;
        document.getElementById('mcqType').style.display = 'inline-block';
        document.getElementById('mcqMeaningText').innerText = currentQ.meaning;

        let distractors = rawData.filter(w => w.hanzi !== currentQ.hanzi);
        distractors = shuffleArray(distractors).slice(0, 3);
        
        let options = [currentQ, ...distractors];
        options = shuffleArray(options);

        const optionsContainer = document.getElementById('mcqOptions');
        optionsContainer.innerHTML = "";

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'mcq-btn';
            btn.innerText = opt.hanzi;
            btn.onclick = () => checkAnswer(btn, opt.hanzi, currentQ.hanzi);
            optionsContainer.appendChild(btn);
        });

        updateMcqUI();
    }

    function checkAnswer(clickedBtn, selectedHanzi, correctHanzi) {
        if (answered) return;
        answered = true;

        const allBtns = document.querySelectorAll('.mcq-btn');
        const feedback = document.getElementById('mcqFeedback');

        if (selectedHanzi === correctHanzi) {
            clickedBtn.classList.add('correct');
            feedback.innerHTML = "✅ 정답입니다!";
            feedback.style.color = "#27ae60";
            score++;
        } else {
            clickedBtn.classList.add('wrong');
            feedback.innerHTML = `❌ 오답입니다. 정답은 <b>[ ${correctHanzi} ]</b> 입니다.`;
            feedback.style.color = "#e74c3c";
            
            allBtns.forEach(b => {
                if(b.innerText === correctHanzi) b.classList.add('correct');
            });
        }

        updateMcqUI();
        document.getElementById('mcqNextBtn').style.display = 'block';
    }

    function loadNextMcq() {
        mcqIndex++;
        loadMcqQuestion();
    }

    function updateMcqUI() {
        if(mcqIndex < mcqDeck.length) {
            document.getElementById('mcqProgress').innerText = `문제: ${mcqIndex + 1} / ${mcqDeck.length}`;
        }
        document.getElementById('mcqScore').innerText = `점수: ${score} 점`;
    }
